<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Share Tech Mono',monospace;
  overflow:hidden;
}

.top{
  position:fixed;

  display:flex;

.box{
  background:#111;

.center{
  background:#111;

}

.dot{
  width:30px;

  margin-top:10px;

</head>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
">

<h2 style="color:white;">🔐 LOGIN</h2>

<input type="password" id="loginPass" placeholder="Enter Password"
style="padding:10px;margin:10px;border-radius:5px;border:none;">

<button onclick="checkLogin()" style="
padding:10px 20px;
background:red;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
">LOGIN</button>

</div><body>

<div class="top">

  <div class="banner">MRX OWNER 💸</div>

  <div class="row">

    <div class="box">
      <div>Color</div>
      <div class="dot" id="colorDot"></div>
    </div>

    <div class="center">
      <div id="status">Loading...</div>
      <div id="prediction">--</div>
    </div>

    <div class="box">
      <div>Number</div>
      <div id="number">-</div>
    </div>

  </div>

  <div class="period" id="period">PERIOD --</div>

</div>

<div class="game">
<iframe src="https://amarclub1.com/#/register?invitationCode=138751536874"></iframe>
</div>

<script>
/* ===== LOGIN SYSTEM ===== */

function checkLogin(){

  let pass = document.getElementById("loginPass").value;

  let users = JSON.parse(localStorage.getItem("users") || "[]");

  let user = users.find(u => u.pass === pass);

  if(user){

    if(Date.now() > user.expire){
      alert("⛔ Expired!");
      return;
    }

    // hide login
    document.getElementById("loginScreen").style.display = "none";

  }else{
    alert("❌ Wrong Password");
  }
}
const API_URL='https://api.bdg88zf.com/api/webapi/GetGameIssue';

const API_PAYLOAD={
  typeId:1,
  language:0,
  random:"40079dcba93a48769c6ee9d4d4fae23f",
  signature:"D12108C4F57C549D82B23A91E0FA20AE",
  timestamp:1727792520
};

const prediction=document.getElementById('prediction');
const number=document.getElementById('number');
const dot=document.getElementById('colorDot');
const status=document.getElementById('status');
const periodEl=document.getElementById('period');

let lastPeriod=null;

/* ===== SMART ENGINE ===== */
let history=[];
let lossStreak=0;
let lastPrediction=null;

function smartEngine(lastDigit){

  history.push(lastDigit);
  if(history.length>20) history.shift();

  let pred;

  if(history.slice(-3).every(n=>n%2===0)){
    pred=[1,3,5,7,9][Math.floor(Math.random()*5)];
  }
  else if(history.slice(-3).every(n=>n%2!==0)){
    pred=[0,2,4,6,8][Math.floor(Math.random()*5)];
  }
  else if(history.filter(n=>n===lastDigit).length>=3){
    pred=(lastDigit+Math.floor(Math.random()*5)+1)%10;
  }
  else{
    let even=history.filter(n=>n%2===0).length;
    let odd=history.length-even;

    if(even>odd){
      pred=[1,3,5,7,9][Math.floor(Math.random()*5)];
    }else{
      pred=[0,2,4,6,8][Math.floor(Math.random()*5)];
    }
  }

  if(lastPrediction!==null){
    if(lastPrediction!==lastDigit){
      lossStreak++;

      if(lossStreak===1){
        pred=(lastPrediction+5)%10;
      }

      if(lossStreak>=2){
        pred=lastDigit%2===0
          ? [1,3,5,7,9][Math.floor(Math.random()*5)]
          : [0,2,4,6,8][Math.floor(Math.random()*5)];
      }

    }else{
      lossStreak=0;
    }
  }

  lastPrediction=pred;
  return pred;
}

/* ===== APPLY LOGIC WITH 2 NUMBERS ===== */

function applyLogic(lastDigit){

  const base = smartEngine(lastDigit);

  const size = base >= 5 ? 'BIGG' : 'SMALL';
  const color = base % 2 === 0 ? 'RED' : 'GREEN';

  function getValidNumbers(size, color){
    let nums=[];
    for(let i=0;i<=9;i++){
      if(size==='SMALL' && i>4) continue;
      if(size==='BIGG' && i<5) continue;
      if(color==='RED' && i%2!==0) continue;
      if(color==='GREEN' && i%2===0) continue;
      nums.push(i);
    }
    return nums;
  }

  const valid = getValidNumbers(size,color);

  let n1 = valid[Math.floor(Math.random()*valid.length)];
  let n2;

  do{
    n2 = valid[Math.floor(Math.random()*valid.length)];
  }while(n2===n1);

  return{
    numbers: n1 + "/" + n2,
    size:size,
    color:color
  };
}

/* ===== UI UPDATE ===== */

function updateUI(lastDigit){

  const data = applyLogic(lastDigit);

  prediction.textContent = data.size;
  prediction.style.color = data.size==='BIGG'?'orange':'cyan';

  number.textContent = data.numbers;

  dot.style.background = data.color==='RED'
    ? 'linear-gradient(red,pink)'
    : 'linear-gradient(lime,green)';

  prediction.style.transition="0.3s";
  number.style.transition="0.3s";
  dot.style.transition="0.3s";
}

/* ===== API FETCH ===== */

async function fetchData(){
  try{
    const res=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(API_PAYLOAD)
    });

    const data=await res.json();

    if(data.code===0){

      status.textContent="ONLINE";

      const p=data.data.issueNumber.toString();

      if(p!==lastPeriod){

        lastPeriod=p;

        const current=Number(p);

        periodEl.textContent="PERIOD "+current;

        setTimeout(()=>{
          periodEl.textContent="PERIOD "+(current+1);
        },500);

        const lastDigit=parseInt(p.slice(-1));
        updateUI(lastDigit);
      }

    }else{
      status.textContent="OFFLINE";
    }

  }catch(e){
    status.textContent="ERROR";
  }
}

fetchData();
setInterval(fetchData,1200);
</script>

</body>
</html>
